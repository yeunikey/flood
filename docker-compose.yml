services:
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Astana2026!Bigdata
      - POSTGRES_DB=flood
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  info-db:
    image: postgres:15-alpine
    container_name: postgres-info-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Astana2026!Bigdata
      - POSTGRES_DB=info
    ports:
      - "5434:5432"
    volumes:
      - db_info_data:/var/lib/postgresql/data

  streamflow-db:
    image: postgres:15-alpine
    container_name: postgres-streamflow-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Astana2026!Bigdata
      - POSTGRES_DB=hydro_forecasts
    ports:
      - "5435:5432"
    volumes:
      - db_streamflow_data:/var/lib/postgresql/data

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ".env.dev"
    environment:
      - NODE_ENV=development
    depends_on:
      - db

  gateway:
    image: nginx:alpine
    container_name: gateway
    restart: always
    ports:
      - "3001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth-service
      - data-service
      - tiles-service
      - streamflow-model
      - db

  # info-service:
  #   container_name: info-service
  #   build:
  #     context: ./services/info
  #     target: dev
  #   restart: always
  #   expose:
  #     - "3000"
  #   volumes:
  #     - ./services/info:/app
  #     - /app/node_modules
  #     - /app/dist
  #   env_file:
  #     - ".env.dev"
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   depends_on:
  #     - db

  auth-service:
    container_name: auth-service
    build:
      context: ./services/auth
      target: dev
    restart: always
    expose:
      - "3000"
    volumes:
      - ./services/auth:/app
      - /app/node_modules
      - /app/dist
    env_file:
      - ".env.dev"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db

  data-service:
    container_name: data-service
    build:
      context: ./services/data
      target: dev
    restart: always
    expose:
      - "3000"
    volumes:
      - ./services/data:/app
      - /app/node_modules
      - /app/dist
      - ./libs:/app/libs
    env_file:
      - ".env.dev"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db

  tiles-service:
    container_name: tiles-service
    build:
      context: ./services/tiles
      dockerfile: Dockerfile
      target: dev
    restart: always
    expose:
      - "3000"
      - "5000"
    volumes:
      - ./services/tiles:/app
      - /app/node_modules
      - ./uploads:/app/uploads
      - ./libs:/app/libs
    env_file:
      - ".env.dev"
    environment:
      - UPLOADS_PATH=/app/uploads
      - TILESERVER_CONFIG_PATH=/app/uploads/tileserver-config
      - GRPC_URL=0.0.0.0:5000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db

  streamflow-model:
    container_name: streamflow-model
    build:
      context: ./models/streamflow-model
      dockerfile: Dockerfile
    restart: always
    expose:
      - "8000"
    volumes:
      - ./models/streamflow-model:/app
      - /Users/yeunikey/Downloads/_cdsapirc.uu:/root/.cdsapirc:ro
    environment:
      PG_URL: postgresql://postgres:Astana2026!Bigdata@streamflow-db:5432/hydro_forecasts
      MODEL_STORE: /app/models/uba_lumped
      TZ_DEFAULT: Asia/Almaty
      DATA_LATENCY_DAYS: "6"
      AOI_BBOX: "81.4833333333,50.25,84.2710979886,51.0170199924"
      MODEL_RAW_ROOT: /app/ingest/model_raw_data
      AUTO_PREPARE_FEATURES: "true"
      USE_DAILY_FEATURES: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - streamflow-db

volumes:
  db_data:
  db_info_data:
  db_streamflow_data:
