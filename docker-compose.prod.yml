services:
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    env_file:
      - ".env.prod"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=flood
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  streamflow-db:
    image: postgis/postgis:18-3.6
    container_name: postgres-streamflow-db
    restart: always
    env_file:
      - ".env.prod"
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=hydro_forecasts
    volumes:
      - db_streamflow_data:/var/lib/postgresql

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_URL: "https://panel-api.flood.astanait.edu.kz/v1"
        NEXT_PUBLIC_SOCKET_URL: "https://panel-api.flood.astanait.edu.kz"
    restart: always
    ports:
      - "3003:3000"
    env_file:
      - ".env.prod"
    depends_on:
      - db

  gateway:
    image: nginx:alpine
    container_name: gateway
    restart: always
    ports:
      - "3004:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth-service
      - data-service
      - tiles-service
      - streamflow-model

  auth-service:
    container_name: auth-service
    build:
      context: ./services/auth
      dockerfile: Dockerfile
      target: runner
    restart: always
    expose:
      - "3000"
    env_file:
      - ".env.prod"
    depends_on:
      - db

  data-service:
    container_name: data-service
    build:
      context: ./services/data
      dockerfile: Dockerfile
      target: runner
    restart: always
    expose:
      - "3000"
    volumes:
      - ./libs:/app/libs
    env_file:
      - ".env.prod"
    depends_on:
      - db

  tiles-service:
    container_name: tiles-service
    build:
      context: ./services/tiles
      dockerfile: Dockerfile
      target: runner
    restart: always
    expose:
      - "3000"
      - "5000"
    volumes:
      - ./uploads:/app/uploads
      - ./libs:/app/libs
    env_file:
      - ".env.prod"
    environment:
      - UPLOADS_PATH=/app/uploads
      - TILESERVER_CONFIG_PATH=/app/uploads/tileserver-config
      - GRPC_URL=0.0.0.0:5000
    depends_on:
      - db

  streamflow-model:
    container_name: streamflow-model
    build:
      context: ./models/streamflow-model
      dockerfile: Dockerfile
    restart: always
    expose:
      - "8000"
    env_file:
      - ".env.prod"
    volumes:
      - ./models/streamflow-model:/app
      - ./libs/_cdsapirc.uu:/root/.cdsapirc:ro
    environment:
      MODEL_STORE: /app/models/uba_lumped
      TZ_DEFAULT: Asia/Almaty
      DATA_LATENCY_DAYS: "6"
      AOI_BBOX: "81.4833333333,50.25,84.2710979886,51.0170199924"
      MODEL_RAW_ROOT: /app/ingest/model_raw_data
      AUTO_PREPARE_FEATURES: "true"
      USE_DAILY_FEATURES: "true"
    depends_on:
      - streamflow-db

volumes:
  db_data:
  db_streamflow_data:
  tiles_uploads:
